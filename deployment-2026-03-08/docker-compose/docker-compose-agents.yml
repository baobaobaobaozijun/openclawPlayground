services:
  jiangrou:
    image: ghcr.io/openclaw/openclaw:latest
   container_name: openclaw-instance-1
   ports:
      - "18791:18789"
   environment:
      - OPENCLAW_MODEL=bailian/qwen3-coder-plus
      - OPENCLAW_API_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENCLAW_API_KEY=sk-0101b7d3672245ac8cd15d454198b4db
      - INSTANCE_NAME=jiangrou
      - INSTANCE_ROLE=backend-engineer
      # ⭐ 关键：配置连接到本地灌汤 Gateway
      - OPENCLAW_GATEWAY_URL=http://host.docker.internal:18789
      - OPENCLAW_GATEWAY_TOKEN=4aa59ed646303abc8fdeb18147ab277c8f17b2ddff626a39
    volumes:
      - openclaw-data-1:/home/node
      - F:\openclaw\code\backend:/app/backend
      - F:\openclaw\agent\workspace-jiangrou:/app/workspace
      - F:\openclaw\workspace\communication:/app/communication
   restart: unless-stopped
   networks:
      - openclaw-network
    extra_hosts:
      # ⭐ 关键：允许访问宿主机网络
      - "host.docker.internal:host-gateway"
   command: openclaw gateway run

  dousha:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-instance-2
    ports:
      - "18792:18789"
    environment:
      - OPENCLAW_MODEL=bailian/qwen3-coder-plus
      - OPENCLAW_API_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENCLAW_API_KEY=sk-dc74719ea21348f183cbabb87f01999c
      - INSTANCE_NAME=dousha
      - INSTANCE_ROLE=frontend-engineer
    volumes:
      - openclaw-data-2:/home/node
      - F:\openclaw\code\frontend:/app/frontend
      - F:\openclaw\agent\workspace-dousha:/app/workspace
      - F:\openclaw\workspace\communication:/app/communication
    restart: unless-stopped
    networks:
      - openclaw-network
    command: openclaw gateway run

  suancai:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-instance-3
    ports:
      - "18793:18789"
    environment:
      - OPENCLAW_MODEL=bailian/qwen3-coder-plus
      - OPENCLAW_API_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - OPENCLAW_API_KEY=sk-1edeed01f7104f75b0c4c69237b7f577
      - INSTANCE_NAME=suancai
      - INSTANCE_ROLE=devops-engineer
    volumes:
      - openclaw-data-3:/home/node
      - F:\openclaw\code\deploy:/app/deploy
      - F:\openclaw\code\tests:/app/tests
      - F:\openclaw\agent\workspace-suancai:/app/workspace
      - F:\openclaw\workspace\communication:/app/communication
    restart: unless-stopped
    networks:
      - openclaw-network
    command: openclaw gateway run

volumes:
  openclaw-data-1:
  openclaw-data-2:
  openclaw-data-3:

networks:
  openclaw-network:
    driver: bridge
