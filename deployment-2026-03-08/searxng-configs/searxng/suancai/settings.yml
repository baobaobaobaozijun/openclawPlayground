# 简化的 SearXNG 配置 - 酸菜运维知识搜索引擎
use_default_settings: true

general:
  debug: false
  instance_name: "Suancai DevOps Search"
  enable_metrics: true

search:
  safe_search: 0
  autocomplete: 'google'
  default_lang: ''

server:
  secret_key: "suancai-devops-search-secret-key-2026"
  limiter: false
  image_proxy: false

ui:
  default_theme: simple
  default_locale: ''
  infinite_scroll: true
